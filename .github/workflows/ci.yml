name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build binary
        run: |
          go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-$GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o reqshift-agent \
            ./cmd/reqshift-agent
      - uses: actions/upload-artifact@v4
        with:
          name: reqshift-agent
          path: reqshift-agent
          retention-days: 7

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build multi-platform binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.buildDate=${BUILD_DATE}"

          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/reqshift-agent-linux-amd64   ./cmd/reqshift-agent
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/reqshift-agent-linux-arm64   ./cmd/reqshift-agent
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/reqshift-agent-darwin-amd64  ./cmd/reqshift-agent
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/reqshift-agent-darwin-arm64  ./cmd/reqshift-agent
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/reqshift-agent-windows-amd64.exe ./cmd/reqshift-agent

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
